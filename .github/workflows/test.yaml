name: "Tests"
run-name: "Test (⚙️ ${{ inputs.os }}, 🐳 ${{ inputs.container-engine }})"
on:
  workflow_call:
    inputs: &inputs
      os:
        type: string
        default: ubuntu-latest
        description: Runner OS
      container-engine:
        type: string
        default: docker@latest
        description: Container engine type and version. Use "none" to skip container setup. See .github/actions/setup-container-engine for more info.
    secrets:
      QODANA_LICENSE_ONLY_TOKEN:
        required: true
      QODANA_CLI_DEPS_TOKEN:
        required: true
  workflow_dispatch:
    inputs: *inputs

jobs:
  test:
    name: Test
    runs-on: ${{ inputs.os }}
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.QODANA_JBR_TOKEN }}
      QODANA_CLI_DEPS_TOKEN: ${{ secrets.QODANA_CLI_DEPS_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require the deps token
        # The real clang/cdnet linter tests always run, so the token is mandatory: a missing one
        # (e.g. an accidentally-deleted Actions secret) must fail loud here, never silently skip.
        if: env.QODANA_CLI_DEPS_TOKEN == ''
        shell: bash
        run: |
          echo "::error::QODANA_CLI_DEPS_TOKEN is not set; the real clang/cdnet linter tests cannot run (was the Actions secret deleted?)." >&2
          exit 1

      - name: Setup container engine
        if: inputs.container-engine != 'none'
        uses: ./.github/actions/setup-container-engine
        with:
          version: ${{ inputs.container-engine }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          cache-dependency-path: "**/*.sum"
          go-version-file: go.mod

      - name: Set up Java 21 for config-loader-cli.jar
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Ninja + LLVM (Windows clang real-mode)
        # cmake defaults to the MSVC generator on Windows, which does not emit compile_commands.json;
        # the clang TestLinterRun bootstrap needs Ninja + clang to produce it.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja llvm -y
          clang --version
          ninja --version

      - name: Force clang/Ninja CMake generator (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          {
            echo "CC=clang"
            echo "CXX=clang++"
            echo "CMAKE_GENERATOR=Ninja"
          } >> "$GITHUB_ENV"

      - name: Install .NET 8 (cdnet real-mode)
        # The pinned ReSharper CLT ships tools/net8.0/...; the cdnet TestLinterRun runs `dotnet <clt.dll>`.
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: ./.github/actions/qodana-build-cache

      - name: Install test dependencies
        run: go install github.com/mfridman/tparse@latest

      - name: Build
        # Build everything that will be tested. Although go test performs a build itself, gotestfmt will panic on a
        # failed build.
        shell: bash
        run: |
          go generate -v ./...
          go build -v ./...

      - name: Export GOROOT and GOPATH
        shell: bash
        run: |
          echo "GOROOT=$(go env GOROOT)" >> "$GITHUB_ENV"
          echo "GOPATH=$(go env GOPATH)" >> "$GITHUB_ENV"

      - name: Run tests
        run: go test -v -json ./... -timeout 0 -coverpkg=./... -coverprofile=coverage-${{ inputs.os }}.out | tparse -all -follow
        env:
          QODANA_LICENSE_ONLY_TOKEN: ${{ secrets.QODANA_LICENSE_ONLY_TOKEN }}
          QT_ENABLE_DOCKER: ${{ inputs.container-engine != 'none' && '1' || '0' }}
          QT_ENABLE_CONTAINER_TESTS: ${{ inputs.os == 'ubuntu-latest' && inputs.container-engine == 'docker@latest' && '1' || '0' }}
          QT_ENABLE_CLANG_DEPS: '1'
          QT_ENABLE_CDNET_DEPS: '1'

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-${{ inputs.os }}-${{ inputs.container-engine }}
          path: coverage-${{ inputs.os }}.out
