name: Cache JBR build artifacts
description: Restore/save the .cache/jbr directory for JBR build caching
runs:
  using: composite
  steps:
    - name: Cache JBR build artifacts
      # Performance hint only — the build script validates upstream SHA-512 checksums
      # internally and will re-download/rebuild on mismatch regardless of cache state.
      uses: actions/cache@v4
      with:
        path: .cache/jbr
        key: qodana-jbr-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('internal/tooling/scripts/build-qodana-jbr.go', 'internal/tooling/scripts/pom.xml') }}
        restore-keys: |
          qodana-jbr-${{ runner.os }}-${{ runner.arch }}-
