repos:
  # Local hooks that must run before lint
  - repo: local
    hooks:
      - id: go-generate
        name: go generate (tooling)
        entry: go generate -v ./internal/tooling/...
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # golangci-lint (official hooks)
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.6.1
    hooks:
      - id: golangci-lint-full

  # Local hooks that run after lint
  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]
